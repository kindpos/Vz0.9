<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINDpos — Terminal Vz0.9</title>
<style>
@font-face{font-family:'Alien Encounters Solid Bold';src:url('assets/fonts/Alien-Encounters-Solid-Bold.ttf') format('truetype');font-weight:700;font-display:swap;}
@font-face{font-family:'Sevastopol Interface';src:url('assets/fonts/Sevastopol-Interface.ttf') format('truetype');font-weight:400;font-display:swap;}
:root{
  --bg:#333333;--bg2:#222222;--bg3:#444444;
  --mint:#C6FFBB;--mint-dim:rgba(198,255,187,0.25);--mint-hover:#d4ffca;
  --yellow:#FBDE42;--red:#E84040;--cyan:#00CED1;--orange:#FF8C00;
  --fh:'Alien Encounters Solid Bold','Impact','Arial Black',sans-serif;
  --fb:'Sevastopol Interface','Courier New','Lucida Console',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1a1a;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;font-family:var(--fb);color:var(--mint);}
#app{width:1024px;height:600px;background:var(--bg);overflow:hidden;position:relative;display:flex;flex-direction:column;}
#tbar{height:30px;background:var(--mint);color:var(--bg);font-family:var(--fh);display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-size:14px;flex-shrink:0;}
#sbar{height:30px;background:var(--bg);color:var(--mint);border-top:1px solid var(--mint);display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-size:16px;flex-shrink:0;}
#scene{flex:1;overflow:hidden;position:relative;}
/* Button hierarchy per spec */
.btn-p{background:var(--mint);color:var(--bg);border:none;padding:8px 14px;cursor:pointer;font-family:var(--fb);font-size:14px;text-align:center;display:flex;align-items:center;justify-content:center;user-select:none;border-radius:4px;}
.btn-p:hover{background:var(--mint-hover);}
.btn-s{background:var(--bg);color:var(--mint);border:none;padding:8px 14px;cursor:pointer;font-family:var(--fb);font-size:14px;text-align:center;display:flex;align-items:center;justify-content:center;user-select:none;border-radius:4px;}
.btn-s:hover{background:var(--bg3);}
.btn-d{background:var(--red);color:var(--bg);border:none;padding:8px 14px;cursor:pointer;font-family:var(--fb);font-size:14px;text-align:center;display:flex;align-items:center;justify-content:center;user-select:none;border-radius:4px;}
.btn-d:hover{opacity:0.3;}
.btn-num{background:var(--bg);color:var(--mint);border:none;padding:8px;cursor:pointer;font-family:var(--fb);font-size:20px;text-align:center;display:flex;align-items:center;justify-content:center;user-select:none;border-radius:4px;}
.btn-num:hover{background:var(--bg3);}
.btn-off{opacity:0.35;cursor:not-allowed!important;pointer-events:none;}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;}
.dialog{background:var(--bg);border:2px solid var(--mint);border-radius:8px;min-width:300px;max-width:420px;overflow:hidden;}
.dlg-h{background:var(--mint);color:var(--bg);padding:6px 10px;font-family:var(--fh);display:flex;justify-content:space-between;align-items:center;font-size:14px;}
.dlg-b{padding:14px;display:flex;flex-direction:column;gap:12px;}
.dlg-f{padding:8px 14px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--mint-dim);}
.card{border:2px solid var(--mint);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;}
.card-h{background:var(--mint);color:var(--bg);padding:4px 10px;font-family:var(--fh);font-size:14px;display:flex;justify-content:space-between;align-items:center;min-height:28px;cursor:pointer;}
.card-b{padding:8px 10px;font-size:14px;flex:1;overflow:hidden;}
input[type="text"],input[type="number"]{background:var(--bg2);border:1px solid var(--mint);color:var(--mint);padding:6px 8px;font-family:var(--fb);font-size:14px;outline:none;border-radius:4px;width:100%;}
@keyframes spin{from{transform:rotateY(0deg)}to{transform:rotateY(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes alertPulse{0%,100%{box-shadow:0 0 4px var(--orange);}50%{box-shadow:0 0 14px var(--orange),0 0 20px rgba(255,140,0,0.4);}}
</style>
</head>
<body>
<div id="app">
  <div id="tbar"></div>
  <div id="scene"></div>
  <div id="sbar"></div>
</div>
<script>
// ═══════════════════════════════════════════════════
//  KINDpos Terminal Vz0.9 — Spec-Aligned Demo
//  Nice. Dependable. Yours.
// ═══════════════════════════════════════════════════

const CFG = { TID:"T-01", VER:"Vz0.9", TAX:0.07, CASH_DISC:0.035 };

const ROSTER = [
  {id:"alex",name:"Alex M.",pin:"1234",role:"manager"},
  {id:"jordan",name:"Jordan K.",pin:"5678",role:"server"},
  {id:"casey",name:"Casey R.",pin:"9012",role:"server"},
  {id:"sam",name:"Sam T.",pin:"3456",role:"server"},
];

const MENU = {

  "Sides":[{name:"Waffle Fries",price:5},{name:"Onion Rings",price:5},{name:"Slaw",price:4},{name:"Side Salad",price:4},{name:"Mac & Cheese",price:6}],
  "Drinks":[{name:"Lemonade",price:4},{name:"Soda",price:3},{name:"Water",price:2},{name:"Iced Tea",price:3},{name:"Coffee",price:3}],
  "Extras":[{name:"Cheese +",price:1},{name:"Bacon +",price:2},{name:"Sauce",price:0.5},{name:"Jalapeños",price:0.5},{name:"Avocado",price:1.5}],
  "Desserts":[{name:"Brownie",price:6},{name:"Ice Cream",price:5},{name:"Cheesecake",price:8}],
  "Beer":[{name:"IPA Draft",price:7},{name:"Lager Draft",price:6},{name:"Pilsner",price:6},{name:"Stout",price:8}],
  "Wine":[{name:"House Red",price:9},{name:"House White",price:9},{name:"Prosecco",price:11},{name:"Cab Sauv.",price:12}],
};
const MODIFIERS=["Onions","Jalapeños","Cheese","Bacon","Avocado","Lettuce","Tomato","Pickles","Mayo","Mustard","Ketchup","Hot Sauce"];
const MOD_PREFIXES=["ADD","NO","ON SIDE","LITE","EXTRA"];

// Mock orders with seat data
const MOCK_ORDERS = [

   items:[{name:"Smash Burger",price:12,qty:1,seat:1,sent:false,mods:[]},{name:"Waffle Fries",price:5,qty:1,seat:1,sent:false,mods:[]},{name:"Ribeye",price:24,qty:1,seat:2,sent:true,mods:[{pre:"NO",name:"Onions"}]},{name:"Side Salad",price:4,qty:1,seat:2,sent:true,mods:[]}]},
  {id:"C-102",label:"Bar 1",guest_count:1,server:"Alex M.",status:"printed",elapsed:"0:45",
   items:[{name:"IPA Draft",price:7,qty:2,seat:1,sent:true,mods:[]},{name:"Hot Dog",price:8,qty:1,seat:1,sent:true,mods:[{pre:"ADD",name:"Jalapeños"}]}]},
  {id:"C-103",label:"Patio 5",guest_count:4,server:"Jordan K.",status:"open",elapsed:"0:12",
   items:[{name:"Fish Tacos",price:13,qty:1,seat:1,sent:false,mods:[]},{name:"Fish Tacos",price:13,qty:1,seat:3,sent:false,mods:[]},{name:"Lemonade",price:4,qty:1,seat:1,sent:false,mods:[]},{name:"Lemonade",price:4,qty:1,seat:2,sent:false,mods:[]},{name:"Lemonade",price:4,qty:1,seat:3,sent:false,mods:[]},{name:"Lemonade",price:4,qty:1,seat:4,sent:false,mods:[]}]},
];

const APP={staff:null,screen:'login',orders:[...MOCK_ORDERS],nextNum:104};

// ─── HELPERS ────────────────────────────────────────
const $=(id)=>document.getElementById(id);
const calcOrder=(o)=>{const sub=o.items.reduce((s,i)=>s+i.price*(i.qty||1),0);const tax=sub*CFG.TAX;return{sub,tax,card:sub+tax,cash:(sub+tax)*(1-CFG.CASH_DISC)};};
const calcSeat=(o,sn)=>{const sub=o.items.filter(i=>i.seat===sn).reduce((s,i)=>s+i.price*(i.qty||1),0);const tax=sub*CFG.TAX;return{sub,tax,card:sub+tax};};
const fmtTime=()=>{const n=new Date();return n.toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'2-digit'})+' // '+n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}).toLowerCase();};
const greeting=()=>{const h=new Date().getHours();return h<12?'Good Morning':h<17?'Good Afternoon':'Good Evening';};

// ─── BARS ───────────────────────────────────────────
const SCREEN_TITLES={'snapshot':'Snapshot','check-overview':'Check Overview','add-item':'Add Item','modify':'Modify','payment':'Payment','close-day':'Close Day','settings':'Settings'};
function renderBars(){
  const t=$('tbar'),s=$('sbar');
  if(!APP.staff){
    t.innerHTML=`<span>${fmtTime()}</span><span></span>`;
  } else {
    const badge=APP.staff.role==='manager'?`<span style="background:var(--yellow);color:var(--bg);padding:0 5px;font-size:10px;margin-left:6px;">[MGR]</span>`:`<span style="background:var(--mint);color:var(--bg);padding:0 5px;font-size:10px;margin-left:6px;">[SVR]</span>`;
    const title=SCREEN_TITLES[APP.screen]||'';
    const orderRef=(APP.p&&APP.p.order)?` ${APP.p.order.id}`:'';
    const titlePart=title?` // ${title}${orderRef}`:'';
    t.innerHTML=`<span>${fmtTime()}${titlePart} // ${greeting()}, ${APP.staff.name}${badge}</span><span style="background:var(--red);color:var(--bg);width:24px;height:20px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;border-radius:3px;cursor:pointer;" onclick="go('login')">✕</span>`;
  }

function go(screen,p={}){
  APP.screen=screen;APP.p=p;
  if(screen==='login'){APP.staff=null;APP.orders=JSON.parse(JSON.stringify(MOCK_ORDERS));}
  renderBars();
  const el=$('scene');el.innerHTML='';
  const S={login:scLogin,snapshot:scSnapshot,'check-overview':scCheckOverview,'add-item':scAddItem,modify:scModify,payment:scPayment,'close-day':scCloseDay,settings:scSettings};
  (S[screen]||scPlaceholder)(el,p);
}
function scPlaceholder(el,p){el.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;"><div style="font-family:var(--fh);font-size:22px;">${APP.screen.toUpperCase()}</div><div style="opacity:0.4;">Coming Soon</div><div class="btn-s" style="border:1px solid var(--mint);padding:10px 20px;" onclick="go('snapshot')">← Snapshot</div></div>`;}

function scLogin(el){
  let pin='',err='';

  function renderPinHexes(){
    if(pin.length===0) return '<span style="opacity:0.35;font-size:11px;">enter PIN</span>';
    // Small hexes flowing left to right
    const S=30; const H=S*0.866; const cStep=S*0.75;
    const maxCols=6;
    let html='';
    for(let i=0;i<pin.length&&i<maxCols*2;i++){
      const col=i%maxCols;
      const row=Math.floor(i/maxCols);
      const x=col*cStep+4;
      const y=row*(H+4)+(col%2===1?H*0.5:0)+4;
      html+=`<div style="position:absolute;left:${x}px;top:${y}px;width:${S}px;height:${H}px;display:flex;align-items:center;justify-content:center;">
        <div style="position:absolute;inset:0;background:var(--mint);clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);"></div>
        <div style="position:absolute;inset:2px;background:var(--bg3);clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);"></div>
      </div>`;
    }
    return html;
  }

  function press(k){err='';if(k==='CLR')pin=pin.slice(0,-1);else if(k==='>>>')submit();else if(pin.length<6)pin+=k;if(k!=='>>>')draw();}
  function submit(){if(!pin)return;if(!tryAuth())return;go('snapshot');}
  function tryAuth(){
    const s=ROSTER.find(r=>r.pin===pin);
    if(!s){err='PIN not recognised.';pin='';draw();const f=$('pin-frame');if(f)f.style.animation='shake 0.3s ease';setTimeout(()=>{const f2=$('pin-frame');if(f2)f2.style.animation='';},400);return false;}
    APP.staff=s;return true;
  }
  function makeOrder(type){
    const o={id:`C-${APP.nextNum++}`,label:type==='quick_service'?'Quick':'Table',guest_count:1,server:APP.staff.name,status:'open',elapsed:'0:00',items:[]};
    APP.orders.push(o);return o;
  }
  const kh=(e)=>{if(APP.screen!=='login'){window.removeEventListener('keydown',kh);return;}
    if(e.key>='0'&&e.key<='9')press(e.key);else if(e.key==='Backspace')press('CLR');else if(e.key==='Enter')submit();else if(e.key==='Escape'){pin='';err='';draw();}};
  window.addEventListener('keydown',kh);
  draw();
}

function scSnapshot(el){
  let selTables=new Set();
  const staff=APP.staff,isMgr=staff.role==='manager';
  window._sSel=selTables;

  // Card states: 'default','expanded','collapsed'
  let leftTop='default',leftBot='default',rightTop='default',rightBot='default';
  let msgTab='sent';
  let showFloor=false;

  let alertsUnread=MOCK_MESSAGES.alerts.some(m=>!m.resolved);

  function toggleLeft(which){
    if(which==='top'){
      if(leftTop==='expanded'){leftTop='default';leftBot='default';}
      else{leftTop='expanded';leftBot='collapsed';}
    } else {
      if(leftBot==='expanded'){leftBot='default';leftTop='default';}
      else{leftBot='expanded';leftTop='collapsed';}
    }
    draw();
  }
  function toggleRight(which){
    if(which==='top'){
      if(rightTop==='expanded'){rightTop='default';rightBot='default';}
      else{rightTop='expanded';rightBot='collapsed';}
    } else {
      if(rightBot==='expanded'){rightBot='default';rightTop='default';}
      else{rightBot='expanded';rightTop='collapsed';}
    }
    draw();
  }
  // Expose for inline onclick
  window._tL=toggleLeft;window._tR=toggleRight;
  window._setMsgTab=(t)=>{if(t==='alerts')alertsUnread=false;msgTab=t;draw();};
  window._sDraw=()=>draw();
  window._toggleFloor=()=>{showFloor=!showFloor;draw();};
  window._editClose=()=>{selTables.clear();draw();};

  // Approve/Deny messenger actions
  window._msgAction=(id,action)=>{
    const allMsgs=[...MOCK_MESSAGES.sent,...MOCK_MESSAGES.received,...MOCK_MESSAGES.alerts];
    const msg=allMsgs.find(m=>m.id===id);
    if(msg){msg.status=action;msg.resolved=true;}
    draw();
  };

  // Toast notification
  function showToast(text){
    const t=document.createElement('div');
    t.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--mint);color:var(--bg);padding:14px 28px;border-radius:8px;font-size:16px;font-weight:bold;z-index:200;pointer-events:none;opacity:1;transition:opacity 0.5s;';
    t.textContent=text;
    el.style.position='relative';
    el.appendChild(t);
    setTimeout(()=>{t.style.opacity='0';},1200);
    setTimeout(()=>{t.remove();},1800);
  }
  window._toast=(text)=>showToast(text);

  // Manager: Post Alert overlay
  window._postAlert=()=>{
    const ov=document.createElement('div');ov.className='overlay';
    ov.innerHTML=`<div class="dialog" style="min-width:360px;">
      <div class="dlg-h"><span>POST ALERT</span><span style="cursor:pointer;" onclick="this.closest('.overlay').remove()">✕</span></div>
      <div class="dlg-b">
        <div style="font-size:13px;opacity:0.3;margin-bottom:6px;">This alert will be pushed to all servers</div>
        <input type="text" id="alert-txt" placeholder="e.g. VIP arriving at 8pm, patio closed…" style="font-size:14px;">
      </div>
      <div class="dlg-f">
        <div class="btn-s" style="border:1px solid var(--mint-dim);font-size:14px;padding:8px 16px;" onclick="this.closest('.overlay').remove()">Cancel</div>
        <div class="btn-p" style="font-size:14px;padding:8px 16px;" id="alert-send">Send Alert</div>
      </div>
    </div>`;
    el.appendChild(ov);
    setTimeout(()=>{const i=ov.querySelector('#alert-txt');if(i)i.focus();},50);
    ov.querySelector('#alert-send').onclick=()=>{
      const txt=ov.querySelector('#alert-txt').value.trim();
      if(!txt)return;
      alertsUnread=true;MOCK_MESSAGES.alerts.unshift({id:'M'+Date.now(),text:txt+' — '+staff.name,resolved:false});
      ov.remove();
      showToast('Alert posted');
      draw();
    };
  };

  // Manager: Add to 86 List overlay
  window._add86=()=>{
    const ov=document.createElement('div');ov.className='overlay';
    const allItems=Object.values(MENU).flat();
    ov.innerHTML=`<div class="dialog" style="min-width:360px;">
      <div class="dlg-h"><span>86 AN ITEM</span><span style="cursor:pointer;" onclick="this.closest('.overlay').remove()">✕</span></div>
      <div class="dlg-b">
        <div style="font-size:13px;opacity:0.3;margin-bottom:6px;">Select item to 86</div>

  function draw(){
    const myOrders=APP.orders.filter(o=>o.server===staff.name);
    const floorOrders=APP.orders.filter(o=>o.server!==staff.name);
    const gross=APP.orders.reduce((s,o)=>s+calcOrder(o).sub,0);
    const myGross=myOrders.reduce((s,o)=>s+calcOrder(o).sub,0);

    // ── SHIFT OVERVIEW content ──

      if(isMgr){
        const laborPct=22;// mock 22% labor cost
        // Mock hourly data: today vs last week same day
        const todayHrs=[120,280,410,350,180,320,480,190];
        const lastWkHrs=[150,250,380,400,200,290,440,210];
        const todayTotal=todayHrs.reduce((a,b)=>a+b,0);
        const lastWkTotal=lastWkHrs.reduce((a,b)=>a+b,0);
        const delta=todayTotal-lastWkTotal;
        const deltaPct=lastWkTotal>0?((delta/lastWkTotal)*100).toFixed(1):0;
        const maxVal=Math.max(...todayHrs,...lastWkHrs);

        shiftContent=`

            <svg viewBox="0 0 240 50" style="width:100%;height:50px;" preserveAspectRatio="none">
              <defs>
                <linearGradient id="gFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#44FF88" stop-opacity="0.25"/><stop offset="100%" stop-color="#44FF88" stop-opacity="0"/></linearGradient>
                <linearGradient id="oFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF8C00" stop-opacity="0.15"/><stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/></linearGradient>
              </defs>
              ${(()=>{
                const w=240,h=50,pad=2,pts=todayHrs.length;

                const toY=(v)=>pad+(h-2*pad)*(1-v/maxVal);
                const lwPts=lastWkHrs.map((v,i)=>`${i*step},${toY(v)}`).join(' ');
                const tdPts=todayHrs.map((v,i)=>`${i*step},${toY(v)}`).join(' ');
                const lwArea=lwPts+` ${(pts-1)*step},${h} 0,${h}`;
                const tdArea=tdPts+` ${(pts-1)*step},${h} 0,${h}`;
                return `
                  <polygon points="${lwArea}" fill="url(#oFill)"/>
                  <polyline points="${lwPts}" fill="none" stroke="#FF8C00" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.7"/>
                  ${lastWkHrs.map((v,i)=>`<circle cx="${i*step}" cy="${toY(v)}" r="2.5" fill="#FF8C00" opacity="0.7"/>`).join('')}

              ${EIGHTY_SIXED.length>0?EIGHTY_SIXED.map(s=>`<div style="font-size:14px;margin-bottom:3px;color:#FF5555;text-shadow:0 0 4px rgba(255,85,85,0.3);">✕ ${s.name} (${s.reason})</div>`).join(''):'<div style="font-size:14px;opacity:0.4;">All clear</div>'}
            </div>
          `:''}
        `;
      }
    }

    // ── MESSENGER content ──
    let messengerContent='';
    if(leftBot!=='collapsed'){
      const tabs=isMgr?['sent','received','alerts']:['sent','alerts'];
      const tabColors={sent:'var(--cyan)',received:'var(--mint)',alerts:'var(--orange)'};
      const tabLabels={sent:'SENT',received:'RECV',alerts:'ALERTS'};

      let msgs=[];

      const msgCards=msgs.map(m=>{
        const faded=m.resolved?'opacity:0.35;':'';

              ${msgs.length>0?msgCards:'<div style="font-size:13px;opacity:0.4;font-style:italic;padding:6px;">No messages</div>'}

            ${isMgr?`<div style="padding:4px;border-top:1px solid var(--mint-dim);"><div class="btn-p" style="width:100%;font-size:12px;padding:4px;" onclick="window._postAlert()">Post Alert</div></div>`:''}

      reportContent=`

            <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:3px;"><span style="opacity:0.5;">Cash Sales</span><span style="color:#FFD700;font-weight:bold;">$${(gross*0.25).toFixed(2)}</span></div>

    // ── HARDWARE content ──
    let hwContent='';
    if(rightBot!=='collapsed'){
      const devices=[{name:'Printers',status:'ok',detail:'2 online'},{name:'Payment',status:'ok',detail:'Dejavoo ready'},{name:'Network',status:'ok',detail:'LAN active'}];
      hwContent=devices.map(d=>{
        const color=d.status==='ok'?'#44FF88':d.status==='warn'?'#FFD700':'#FF4444';
        const glow=d.status==='ok'?'0 0 6px rgba(68,255,136,0.5)':d.status==='warn'?'0 0 6px rgba(255,215,0,0.5)':'0 0 6px rgba(255,68,68,0.5)';
        const icon=d.status==='ok'?'●':d.status==='warn'?'▲':'✕';
        return `<div style="display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:6px;">

          <span>${d.name}</span>
          <span style="margin-left:auto;font-size:12px;opacity:0.5;">${d.detail}</span>
        </div>`;
      }).join('');
      if(rightBot==='expanded'){
        hwContent+=`
          <div style="margin-top:6px;border-top:1px solid var(--mint-dim);padding-top:6px;">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;"><span style="opacity:0.5;">Uptime</span><span>14h 32m</span></div>
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;"><span style="opacity:0.5;">Temp</span><span>48°C</span></div>
            <div style="display:flex;justify-content:space-between;font-size:13px;"><span style="opacity:0.5;">Storage</span><span>2.1 GB free</span></div>
          </div>
        `;
      }
    }

    el.innerHTML=`<div style="display:flex;height:100%;">
      <!-- LEFT 278px -->
      <div style="width:278px;border-right:1px solid var(--mint-dim);display:flex;flex-direction:column;gap:6px;padding:6px;overflow:hidden;">
        <div class="card" style="${cardStyle(leftTop)}overflow:hidden;">
          <div class="card-h" onclick="window._tL('top')"><span>SHIFT OVERVIEW</span><span>${leftTop==='expanded'?'−':'+'}</span></div>
          ${leftTop!=='collapsed'?`<div class="card-b" style="overflow-y:auto;">${shiftContent}</div>`:''}
        </div>
        <div class="card" style="${cardStyle(leftBot)}overflow:hidden;">
          <div class="card-h" onclick="window._tL('bot')"><span>MESSENGER</span><span>${leftBot==='expanded'?'−':'+'}</span></div>
          ${leftBot!=='collapsed'?`<div class="card-b" style="overflow-y:auto;display:flex;flex-direction:column;">${messengerContent}</div>`:''}
        </div>
      </div>

      <!-- CENTER 408px -->
      <div style="width:408px;padding:6px 0;display:flex;flex-direction:column;overflow:hidden;">
        <div style="border:2px solid var(--mint);flex:1;display:flex;flex-direction:column;position:relative;border-radius:6px;overflow:hidden;">
        <div class="card-h" style="border-radius:0;min-height:26px;"><span>CHECK OVERVIEW</span><span style="cursor:pointer;opacity:0.5;">&lt;/&gt;</span></div>
        <div style="flex:1;overflow-y:auto;padding:10px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-size:13px;opacity:0.4;letter-spacing:1px;">MY CHECKS — ${myOrders.length}</span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,78px);gap:11px 36px;justify-content:center;margin-bottom:14px;" id="my-tiles"></div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;" onclick="window._toggleFloor()">
            <span style="font-size:13px;opacity:0.4;letter-spacing:1px;border-top:1px solid var(--mint-dim);padding-top:8px;flex:1;">FLOOR — ${floorOrders.length}</span>
            <span style="font-size:12px;opacity:0.4;padding-top:8px;">${showFloor?'▼ hide':'▶ show'}</span>
          </div>
          ${showFloor?`<div style="display:grid;grid-template-columns:repeat(3,78px);gap:11px 36px;justify-content:center;opacity:0.5;" id="floor-tiles"></div>`:``}
        </div>
        <div id="edit-bar" style="position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;"></div>
        </div>
      </div>

      <!-- RIGHT 278px -->
      <div style="width:278px;border-left:1px solid var(--mint-dim);display:flex;flex-direction:column;gap:6px;padding:6px;overflow:hidden;">
        <div class="card" style="${cardStyle(rightTop)}overflow:hidden;">
          <div class="card-h" onclick="window._tR('top')"><span>REPORTING</span><span>${rightTop==='expanded'?'−':'+'}</span></div>
          ${rightTop!=='collapsed'?`<div class="card-b" style="overflow-y:auto;">${reportContent}</div>`:''}
        </div>
        <div class="card" style="${cardStyle(rightBot)}overflow:hidden;">
          <div class="card-h" onclick="window._tR('bot')"><span>HARDWARE</span><span>${rightBot==='expanded'?'−':'+'}</span></div>
          ${rightBot!=='collapsed'?`<div class="card-b" style="overflow-y:auto;">${hwContent}</div>`:''}
        </div>
      </div>
    </div>`;

    // ── Render table tiles ──
    const renderTiles=(orders,cid)=>{
      const c=$(cid);if(!c)return;
      orders.forEach(o=>{
        const tot=calcOrder(o).sub;
        const colors={open:'var(--mint)',printed:'var(--yellow)',idle:'var(--red)'};
        const sel=selTables.has(o.id);
        const t=document.createElement('div');
        t.style.cssText=`width:78px;height:77px;border:2px solid ${colors[o.status]||'var(--mint)'};background:${sel?'var(--mint)':'var(--bg)'};color:${sel?'var(--bg)':'var(--mint)'};cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-radius:6px;user-select:none;`;
        t.innerHTML=`<span style="font-size:14px;font-weight:bold;">${o.label}</span><span style="font-size:11px;opacity:0.6;">${o.guest_count}g · ${o.elapsed}</span><span style="font-size:13px;color:${sel?'var(--bg)':'var(--yellow)'};">$${tot.toFixed(2)}</span>`;
        t.onclick=()=>{selTables.has(o.id)?selTables.delete(o.id):selTables.add(o.id);draw();};
        let lp;
        t.onmousedown=()=>{lp=setTimeout(()=>{go('check-overview',{order:o});},400);};
        t.onmouseup=()=>clearTimeout(lp);t.onmouseleave=()=>clearTimeout(lp);
        c.appendChild(t);
      });
      if(cid==='my-tiles'){
        const nb=document.createElement('div');
        nb.style.cssText='width:78px;height:77px;border:2px dashed var(--mint-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:26px;opacity:0.35;border-radius:6px;';
        nb.textContent='＋';nb.onclick=()=>showNewCheck();
        c.appendChild(nb);
      }
    };
    renderTiles(myOrders,'my-tiles');
    if(showFloor&&floorOrders.length>0)renderTiles(floorOrders,'floor-tiles');

    // ── Edit card (floating) ──
    const eb=$('edit-bar');
    const selO=APP.orders.filter(o=>selTables.has(o.id));
    if(selO.length>0){
      const multi=selO.length>1;
      const o=selO[0];
      const tot=calcOrder(o).sub;
      eb.innerHTML=`<div style="pointer-events:auto;background:var(--bg2);border:2px solid var(--mint);border-radius:10px;padding:14px;min-width:260px;box-shadow:0 4px 24px rgba(0,0,0,0.5);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <div>
            <div style="font-family:var(--fh);font-size:16px;">${multi?selO.length+' CHECKS':o.label}</div>
            ${!multi?`<div style="font-size:13px;opacity:0.3;">${o.guest_count} guest${o.guest_count>1?'s':''} · ${o.server} · <span style="color:var(--yellow);">$${tot.toFixed(2)}</span></div>`:''}
          </div>
          <div style="cursor:pointer;font-size:18px;font-weight:bold;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg3);" onclick="window._editClose()">✕</div>
        </div>
        ${!multi?`
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <div class="btn-p" style="font-size:15px;padding:14px;border-radius:6px;" onclick="go('check-overview',{order:APP.orders.find(x=>x.id==='${o.id}')})">Open</div>
            <div class="btn-s" style="font-size:15px;padding:14px;border-radius:6px;border:1px solid var(--mint-dim);" onclick="window._toast('Printing ${o.label}…')">Print</div>
            <div class="btn-p" style="font-size:15px;padding:14px;border-radius:6px;background:#FFD700;color:var(--bg);" onclick="go('payment',{order:APP.orders.find(x=>x.id==='${o.id}')})">Pay</div>
            <div class="btn-s" style="font-size:15px;padding:14px;border-radius:6px;border:1px solid var(--mint-dim);" onclick="window._transferOverlay('${o.id}')">Transfer</div>
          </div>
        `:`
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <div class="btn-p" style="font-size:15px;padding:14px;border-radius:6px;" onclick="window._toast('Merging ${selO.length} checks…')">Merge</div>
            <div class="btn-s" style="font-size:15px;padding:14px;border-radius:6px;border:1px solid var(--mint-dim);" onclick="window._toast('Printing ${selO.length} checks…')">Print All</div>
          </div>
        `}
      </div>`;
    } else { eb.innerHTML=''; }
  }

  function showNewCheck(){
    let name='',guests=null;
    const ov=document.createElement('div');ov.className='overlay';
    function dd(){
      const ready=guests!==null;
      ov.innerHTML=`<div class="dialog"><div class="dlg-h"><span>New Check</span><span style="cursor:pointer;" onclick="this.closest('.overlay').remove()">✕</span></div>
        <div class="dlg-b">
          <div><div style="font-size:11px;opacity:0.3;margin-bottom:4px;">Table Name (optional)</div><input type="text" id="nc-n" placeholder="e.g. Window 2, Bar 4…" value="${name}" maxlength="20"></div>
          <div><div style="font-size:11px;opacity:0.3;margin-bottom:4px;">Guests</div><div style="display:flex;gap:4px;flex-wrap:wrap;" id="nc-g"></div></div>
        </div>
        <div class="dlg-f"><div class="btn-s" style="border:1px solid var(--mint-dim);font-size:13px;" onclick="this.closest('.overlay').remove()">Cancel</div><div class="btn-p ${ready?'':'btn-off'}" style="font-size:13px;" id="nc-ok">Open Check ▶</div></div>
      </div>`;
      const gc=ov.querySelector('#nc-g');
      for(let n=1;n<=8;n++){const b=document.createElement('div');b.className=guests===n?'btn-p':'btn-s';b.style.cssText=`width:46px;height:42px;font-size:17px;font-weight:bold;${guests!==n?'border:1px solid var(--mint-dim);':''}`;b.textContent=n;b.onclick=()=>{guests=n;dd();};gc.appendChild(b);}
      ov.querySelector('#nc-n').oninput=(e)=>{name=e.target.value;};
      ov.querySelector('#nc-ok').onclick=()=>{if(!guests)return;const o={id:`C-${APP.nextNum++}`,label:name.trim()||`Table ${APP.nextNum-1}`,guest_count:guests,server:APP.staff.name,status:'open',elapsed:'0:00',items:[]};APP.orders.push(o);ov.remove();go('check-overview',{order:o});};
    }
    dd();el.appendChild(ov);
  }
  draw();
}

// ═══════════════════════════════════════════════════
//  CHECK OVERVIEW (per spec: seat management hub)
// ═══════════════════════════════════════════════════
function scCheckOverview(el,p){
  const order=p.order;
  let selSeats=new Set();
  const maxSeat=Math.max(order.guest_count,...order.items.map(i=>i.seat||1));

  function draw(){
    const t=calcOrder(order);
    const allSeats=[];for(let i=1;i<=maxSeat;i++)allSeats.push(i);
    const viewSeats=selSeats.size>0?[...selSeats]:allSeats;
    const viewItems=order.items.filter(i=>viewSeats.includes(i.seat));
    const hasUnsent=order.items.some(i=>!i.sent);

    el.innerHTML=`<div style="display:flex;height:100%;">
      <!-- LEFT: ITEM SUMMARY 378px -->
      <div style="width:378px;border-right:2px solid var(--mint);display:flex;flex-direction:column;">
        <div style="background:var(--mint);color:var(--bg);padding:3px 10px;font-family:var(--fh);font-size:13px;">ITEM SUMMARY</div>
        <div style="padding:4px 10px;font-size:12px;border-bottom:1px solid var(--mint-dim);">
          ${selSeats.size===0?'All Seats':selSeats.size===1?`Seat: ${[...selSeats][0].toString().padStart(2,'0')}`:`Seats: ${[...selSeats].map(s=>s.toString().padStart(2,'0')).join(', ')}`}
        </div>
        <div style="flex:1;overflow-y:auto;padding:6px 10px;font-size:13px;" id="item-rail"></div>
        <div style="border-top:2px solid var(--mint);padding:8px 10px;color:var(--yellow);font-size:14px;">
          <div style="display:flex;justify-content:space-between;"><span>Subtotal</span><span>$${t.sub.toFixed(2)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span>Tax</span><span>$${t.tax.toFixed(2)}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:bold;margin-top:4px;"><span>Total</span><span>$${t.card.toFixed(2)}</span></div>
        </div>
      </div>
      <!-- RIGHT -->
      <div style="flex:1;display:flex;flex-direction:column;padding:8px;gap:8px;">
        <!-- SEAT GRID -->
        <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;" id="seat-grid"></div>
        <!-- ACTION ROW -->
        <div style="display:flex;gap:6px;flex-wrap:wrap;padding:4px 0;border-top:1px solid var(--mint-dim);border-bottom:1px solid var(--mint-dim);">
          <div class="btn-s" style="font-size:12px;padding:6px 12px;">Edit</div>
          <div class="btn-s" style="font-size:12px;padding:6px 12px;">Print</div>
          <div class="btn-s" style="font-size:12px;padding:6px 12px;" onclick="go('payment',{order:order})">Pay</div>
          <div class="btn-s" style="font-size:12px;padding:6px 12px;">Discount</div>
          <div class="btn-s" style="font-size:12px;padding:6px 12px;">Transfer</div>
          <div class="btn-p" style="font-size:12px;padding:6px 14px;margin-left:auto;" onclick="go('add-item',{order:order,seat:selSeats.size===1?[...selSeats][0]:1})">Add Item</div>
        </div>
        <!-- KITCHEN + SEND -->
        <div style="display:flex;gap:8px;flex:1;align-items:flex-end;">
          <div style="display:flex;flex-direction:column;gap:6px;">
            <div class="btn-s" style="width:120px;font-size:12px;padding:8px;border:1px solid var(--mint-dim);">HOLD</div>
            <div class="btn-s" style="width:120px;font-size:12px;padding:8px;border:1px solid var(--mint-dim);">FIRE</div>
            <div class="btn-s" style="width:120px;font-size:12px;padding:8px;border:1px solid var(--mint-dim);">RESEND</div>
          </div>
          <div style="flex:1;"></div>
          <div class="btn-p ${hasUnsent?'':'btn-off'}" style="width:186px;height:93px;font-family:var(--fh);font-size:22px;" onclick="sendAll()">SEND</div>
        </div>
      </div>
    </div>`;

    // Seat grid
    const sg=$('seat-grid');
    // Determine grid sizing
    const cols=allSeats.length<=2?2:allSeats.length<=4?2:allSeats.length<=6?3:4;
    sg.style.display='grid';sg.style.gridTemplateColumns=`repeat(${cols},1fr)`;sg.style.gap='10px';
    allSeats.forEach(sn=>{
      const sel=selSeats.has(sn);
      const seatItems=order.items.filter(i=>i.seat===sn);
      const sTot=seatItems.reduce((s,i)=>s+i.price*(i.qty||1),0);
      const d=document.createElement('div');
      d.style.cssText=`min-height:80px;border:2px solid var(--mint);background:${sel?'var(--mint)':'var(--bg)'};color:${sel?'var(--bg)':'var(--mint)'};border-radius:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;`;
      d.innerHTML=`<span style="font-family:var(--fh);font-size:14px;">SEAT ${sn}</span><span style="font-size:11px;opacity:0.6;">${seatItems.length} items</span><span style="font-size:13px;color:${sel?'var(--bg)':'var(--yellow)'};">$${sTot.toFixed(2)}</span>`;
      d.onclick=()=>{selSeats.has(sn)?selSeats.delete(sn):selSeats.add(sn);draw();};
      sg.appendChild(d);
    });
    // + Seat button
    const addS=document.createElement('div');
    addS.style.cssText='min-height:80px;border:2px dashed var(--mint-dim);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;opacity:0.35;';
    addS.textContent='+ SEAT';
    addS.onclick=()=>{order.guest_count++;draw();};
    sg.appendChild(addS);

    // Item rail — grouped by seat
    const rail=$('item-rail');
    const seatsToShow=selSeats.size>0?[...selSeats].sort():allSeats;
    seatsToShow.forEach(sn=>{
      const seatItems=order.items.filter(i=>i.seat===sn);
      if(seatItems.length===0&&selSeats.size===0)return;
      // Seat divider
      if(seatsToShow.length>1||selSeats.size===0){
        const sTot=seatItems.reduce((s,i)=>s+i.price*(i.qty||1),0);
        const div=document.createElement('div');
        div.style.cssText='display:flex;align-items:center;gap:6px;margin:6px 0 4px;font-size:11px;opacity:0.3;';
        div.innerHTML=`<span style="flex:1;border-top:1px solid var(--mint-dim);"></span><span>SEAT ${sn}</span><span style="color:var(--yellow);">$${sTot.toFixed(2)}</span><span style="flex:1;border-top:1px solid var(--mint-dim);"></span>`;
        rail.appendChild(div);
      }
      seatItems.forEach(item=>{
        const r=document.createElement('div');
        r.style.cssText=`padding:4px 0;font-size:13px;display:flex;flex-direction:column;${item.sent?'opacity:0.3;':''}`;
        let line=`<div style="display:flex;justify-content:space-between;"><span>${item.sent?'✓ ':''}${item.qty||1}x ${item.name}</span><span>$${(item.price*(item.qty||1)).toFixed(2)}</span></div>`;
        (item.mods||[]).forEach(m=>{line+=`<div style="font-size:11px;padding-left:14px;opacity:0.6;">${m.pre} ${m.name}</div>`;});
        r.innerHTML=line;
        rail.appendChild(r);
      });
    });
    if(order.items.length===0){rail.innerHTML='<div style="text-align:center;margin-top:30px;opacity:0.3;">NO ITEMS YET</div>';}
  }

  window.sendAll=()=>{order.items.forEach(i=>i.sent=true);order.status='printed';draw();};

  draw();
}

// ═══════════════════════════════════════════════════
//  ADD ITEM (sub-screen of Check Overview)

function scAddItem(el,p){
  const order=p.order;
  let activeSeat=p.seat||1;
  let cat=Object.keys(MENU)[0];
  let addedThisSession=[];// track for cancel/undo

  function draw(){
    const t=calcOrder(order);
    el.innerHTML=`<div style="display:flex;height:100%;">
      <!-- LEFT: RUNNING LIST -->
      <div style="width:378px;border-right:2px solid var(--mint);display:flex;flex-direction:column;">
        <div style="background:var(--mint);color:var(--bg);padding:3px 10px;font-family:var(--fh);font-size:13px;">ITEM LIST</div>
        <div style="padding:4px 10px;font-size:12px;border-bottom:1px solid var(--mint-dim);display:flex;justify-content:space-between;align-items:center;">

          <div class="btn-s" style="font-size:12px;padding:8px;">Notes</div>

      <div style="flex:1;display:flex;flex-direction:column;">

        <div style="flex:1;padding:8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));grid-auto-rows:80px;gap:6px;overflow-y:auto;" id="item-grid"></div>
        <div style="display:flex;gap:8px;padding:8px;border-top:1px solid var(--bg3);">
          <div class="btn-s" style="flex:1;font-size:13px;border:1px solid var(--mint-dim);" onclick="go('modify',{order:order,seat:activeSeat})">MODIFY</div>
          <div class="btn-d" style="flex:1;font-size:13px;" onclick="cancelAdd()">CANCEL</div>
          <div class="btn-p" style="flex:1;font-size:13px;" onclick="confirmAdd()">CONFIRM</div>
        </div>
      </div>
    </div>`;

    // Seat tabs
    const st=$('seat-tabs');
    for(let s=1;s<=order.guest_count;s++){
      const b=document.createElement('div');
      b.className=activeSeat===s?'btn-p':'btn-s';
      b.style.cssText=`width:30px;height:22px;font-size:11px;padding:0;${activeSeat!==s?'border:1px solid var(--mint-dim);':''}`;
      b.textContent=s;b.onclick=()=>{activeSeat=s;draw();};
      st.appendChild(b);
    }

    // Running list — show items for active seat
    const rail=$('add-rail');
    const seatItems=order.items.filter(i=>i.seat===activeSeat);
    seatItems.forEach(item=>{
      const d=document.createElement('div');
      d.style.cssText=`padding:3px 0;font-size:13px;${item.sent?'opacity:0.4;':''}`;
      d.innerHTML=`<div style="display:flex;justify-content:space-between;"><span>${item.sent?'✓ ':''}${item.qty||1}x ${item.name}</span><span>$${(item.price*(item.qty||1)).toFixed(2)}</span></div>${(item.mods||[]).map(m=>`<div style="font-size:11px;padding-left:14px;opacity:0.6;">${m.pre} ${m.name}</div>`).join('')}`;
      rail.appendChild(d);
    });
    if(seatItems.length===0)rail.innerHTML='<div style="text-align:center;margin-top:20px;opacity:0.3;">Tap items to add →</div>';

    // Category tabs
    const ct=$('cat-tabs');
    Object.keys(MENU).forEach(c=>{
      const t=document.createElement('div');t.textContent=c;
      t.style.cssText=`padding:0 14px;height:100%;display:flex;align-items:center;cursor:pointer;font-family:var(--fh);font-size:12px;letter-spacing:1px;border-bottom:${cat===c?'3px solid var(--mint)':'none'};background:${cat===c?'var(--mint-dim)':'transparent'};white-space:nowrap;`;
      t.onclick=()=>{cat=c;draw();};
      ct.appendChild(t);
    });

    // Item grid
    const ig=$('item-grid');
    MENU[cat].forEach(mi=>{
      const b=document.createElement('div');b.className='btn-s';
      b.style.cssText='height:100%;flex-direction:column;gap:2px;border:1px solid var(--mint-dim);';
      b.innerHTML=`<span style="font-weight:bold;font-size:13px;">${mi.name}</span><span style="font-size:12px;opacity:0.6;">$${mi.price.toFixed(2)}</span>`;
      b.onclick=()=>{
        const newItem={name:mi.name,price:mi.price,qty:1,seat:activeSeat,sent:false,mods:[]};
        order.items.push(newItem);addedThisSession.push(newItem);draw();
      };
      ig.appendChild(b);
    });
    // Open item
    const ob=document.createElement('div');ob.className='btn-s';
    ob.style.cssText='height:100%;flex-direction:column;border:1px dashed var(--mint-dim);';
    ob.innerHTML='<span style="font-size:18px;">+</span><span style="font-size:10px;">OPEN</span>';
    ob.onclick=()=>showOpenItem();
    ig.appendChild(ob);
  }

  window.repeatLast=()=>{const seatItems=order.items.filter(i=>i.seat===activeSeat&&!i.sent);if(seatItems.length>0){const last=seatItems[seatItems.length-1];const dup={...last,mods:[...last.mods]};order.items.push(dup);addedThisSession.push(dup);draw();}};
  window.removeLast=()=>{if(addedThisSession.length>0){const last=addedThisSession.pop();const idx=order.items.lastIndexOf(last);if(idx>=0)order.items.splice(idx,1);draw();}};
  window.cancelAdd=()=>{addedThisSession.forEach(item=>{const idx=order.items.indexOf(item);if(idx>=0)order.items.splice(idx,1);});go('check-overview',{order});};
  window.confirmAdd=()=>{go('check-overview',{order});};

  function showOpenItem(){
    let oiN='',oiP='';
    const ov=document.createElement('div');ov.className='overlay';ov.style.zIndex='200';
    function dd(){
      const ready=oiN.trim()&&parseFloat(oiP)>0;
      ov.innerHTML=`<div class="dialog"><div class="dlg-h"><span>Open Item</span><span style="cursor:pointer;" onclick="this.closest('.overlay').remove()">✕</span></div>
        <div class="dlg-b"><div><div style="font-size:11px;opacity:0.3;margin-bottom:4px;">Name</div><input type="text" id="oi-n" value="${oiN}" placeholder="e.g. Special…"></div><div><div style="font-size:11px;opacity:0.3;margin-bottom:4px;">Price</div><input type="number" id="oi-p" value="${oiP}" placeholder="0.00" step="0.01"></div></div>
        <div class="dlg-f"><div class="btn-s" style="border:1px solid var(--mint-dim);font-size:13px;" onclick="this.closest('.overlay').remove()">Cancel</div><div class="btn-p ${ready?'':'btn-off'}" style="font-size:13px;" id="oi-ok">Add</div></div>
      </div>`;
      ov.querySelector('#oi-n').oninput=(e)=>{oiN=e.target.value;};
      ov.querySelector('#oi-p').oninput=(e)=>{oiP=e.target.value;};
      ov.querySelector('#oi-ok').onclick=()=>{if(!oiN.trim()||!(parseFloat(oiP)>0))return;const ni={name:oiN.trim(),price:parseFloat(oiP),qty:1,seat:activeSeat,sent:false,mods:[]};order.items.push(ni);addedThisSession.push(ni);ov.remove();draw();};
    }
    dd();el.appendChild(ov);setTimeout(()=>{const i=ov.querySelector('#oi-n');if(i)i.focus();},50);
  }
  draw();
}

// ═══════════════════════════════════════════════════
//  MODIFY
// ═══════════════════════════════════════════════════
function scModify(el,p){
  const order=p.order;const seat=p.seat||1;
  let selIdxs=new Set();
  let activePrefix='ADD';
  const seatItems=()=>order.items.filter(i=>i.seat===seat);

  function draw(){
    const items=seatItems();
    el.innerHTML=`<div style="display:flex;height:100%;">
      <!-- LEFT -->
      <div style="width:378px;border-right:2px solid var(--mint);display:flex;flex-direction:column;">
        <div style="background:var(--mint);color:var(--bg);padding:3px 10px;font-family:var(--fh);font-size:13px;">MODIFICATION — Seat ${seat}</div>
        <div style="flex:1;overflow-y:auto;padding:8px;" id="mod-rail"></div>
      </div>
      <!-- RIGHT -->
      <div style="flex:1;display:flex;flex-direction:column;">
        <div style="display:flex;gap:6px;padding:8px;border-bottom:1px solid var(--bg3);" id="prefix-row"></div>
        <div style="flex:1;padding:8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));grid-auto-rows:65px;gap:6px;overflow-y:auto;" id="mod-grid"></div>
        <div style="display:flex;gap:8px;padding:8px;border-top:1px solid var(--bg3);">
          <div class="btn-d" style="flex:1;font-size:13px;" onclick="go('add-item',{order:order,seat:seat})">CANCEL</div>
          <div class="btn-p" style="flex:1;font-size:13px;" onclick="go('add-item',{order:order,seat:seat})">CONFIRM</div>
        </div>
      </div>
    </div>`;

    // Item list
    const rail=$('mod-rail');
    items.forEach((item,i)=>{
      const globalIdx=order.items.indexOf(item);
      const sel=selIdxs.has(globalIdx);
      const d=document.createElement('div');
      d.style.cssText=`padding:6px;cursor:pointer;border-radius:4px;${sel?'background:var(--mint-dim);border:1px solid var(--mint);':'border:1px solid transparent;'}`;
      d.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:14px;"><span>${item.qty||1}x ${item.name}</span><span>$${(item.price*(item.qty||1)).toFixed(2)}</span></div>${(item.mods||[]).map(m=>`<div style="font-size:11px;padding-left:14px;opacity:0.6;">${m.pre} ${m.name}</div>`).join('')}`;
      d.onclick=()=>{selIdxs.has(globalIdx)?selIdxs.delete(globalIdx):selIdxs.add(globalIdx);draw();};
      rail.appendChild(d);
    });
    if(items.length===0)rail.innerHTML='<div style="opacity:0.3;text-align:center;margin-top:20px;">No items on this seat</div>';

    // Prefix row
    const pr=$('prefix-row');
    MOD_PREFIXES.forEach(p=>{
      const b=document.createElement('div');b.className=activePrefix===p?'btn-p':'btn-s';
      b.style.cssText=`flex:1;font-size:12px;${activePrefix!==p?'border:1px solid var(--mint-dim);':''}`;
      b.textContent=p;b.onclick=()=>{activePrefix=p;draw();};
      pr.appendChild(b);
    });

    // Modifier grid
    const mg=$('mod-grid');
    MODIFIERS.forEach(name=>{
      const b=document.createElement('div');b.className='btn-s';
      b.style.cssText='height:100%;font-size:13px;border:1px solid var(--mint-dim);';
      b.textContent=name;
      b.onclick=()=>{
        const targets=selIdxs.size>0?[...selIdxs]:order.items.reduce((a,item,i)=>{if(item.seat===seat&&!item.sent)a.push(i);return a;},[]);
        if(targets.length===0)return;
        targets.forEach(idx=>{if(!order.items[idx].mods)order.items[idx].mods=[];order.items[idx].mods.push({pre:activePrefix,name});});
        draw();
      };
      mg.appendChild(b);
    });
  }
  draw();
}

// ═══════════════════════════════════════════════════
//  PAYMENT (per spec: no tips on this screen)
// ═══════════════════════════════════════════════════
function scPayment(el,p){
  const order=p.order;
  const items=order.items;
  const t=calcOrder(order);
  let tab='Card',cashAmt=0;

  function draw(){
    const due=tab==='Cash'?t.cash:t.card;
    const change=tab==='Cash'&&cashAmt>=due?(cashAmt-due):null;

    el.innerHTML=`<div style="display:flex;height:100%;">
      <!-- LEFT: CHECK PREVIEW -->
      <div style="width:380px;border-right:2px solid var(--mint);display:flex;flex-direction:column;">
        <div style="background:var(--mint);color:var(--bg);padding:3px 10px;font-family:var(--fh);font-size:13px;">CHECK PREVIEW</div>
        <div style="padding:4px 10px;font-size:12px;border-bottom:1px solid var(--mint-dim);">Check: ${order.id} · ${order.label}</div>
        <div style="flex:1;overflow-y:auto;padding:6px 10px;font-size:13px;" id="pay-items"></div>
        <div style="border-top:2px solid var(--mint);padding:8px 10px;color:var(--yellow);font-size:14px;">
          <div style="display:flex;justify-content:space-between;"><span>Subtotal</span><span>$${t.sub.toFixed(2)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span>Tax</span><span>$${t.tax.toFixed(2)}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:bold;margin-top:4px;"><span>Total</span><span>$${t.card.toFixed(2)}</span></div>
        </div>
      </div>
      <!-- RIGHT: PAYMENT -->
      <div style="flex:1;display:flex;flex-direction:column;">
        <!-- TABS -->
        <div style="display:flex;height:36px;">
          ${['Cash','Card'].map(tb=>`<div class="${tab===tb?'btn-p':'btn-s'}" style="flex:1;border-radius:0;font-size:14px;" onclick="setTab('${tb}')">${tb} ($${(tb==='Cash'?t.cash:t.card).toFixed(2)})</div>`).join('')}
        </div>
        <div style="flex:1;display:flex;flex-direction:column;padding:12px;gap:8px;">
          ${tab==='Cash'?`
            <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:bold;"><span>Amount Due</span><span style="color:var(--yellow);">$${due.toFixed(2)}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:14px;"><span>Tendered</span><span>$${cashAmt.toFixed(2)}</span></div>
            ${change!==null?`<div style="display:flex;justify-content:space-between;font-size:16px;font-weight:bold;color:var(--yellow);"><span>Change</span><span>$${change.toFixed(2)}</span></div>`:''}
            <div style="display:flex;flex-wrap:wrap;gap:6px;">
              ${[5,10,20,50,100].map(d=>`<div class="btn-s" style="font-size:13px;padding:8px 14px;border:1px solid var(--mint-dim);" onclick="addCash(${d})">+$${d}</div>`).join('')}
              <div class="btn-p" style="font-size:13px;padding:8px 14px;" onclick="setCashExact()">Exact</div>
              <div class="btn-d" style="font-size:13px;padding:8px 14px;" onclick="clearCash()">Clear</div>
            </div>
          `:`
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;">
              <div style="font-size:40px;">💳</div>
              <div style="font-weight:bold;font-size:15px;">Tap, Insert, or Swipe</div>
              <div style="font-size:12px;opacity:0.4;">Waiting for card reader…</div>
              <div style="font-size:16px;font-weight:bold;color:var(--yellow);margin-top:8px;">$${due.toFixed(2)}</div>
            </div>
          `}
          <div style="flex:1;"></div>
          <div style="display:flex;gap:8px;">
            <div class="btn-s" style="flex:1;font-size:13px;border:1px solid var(--mint-dim);">Loyalty</div>
            <div class="btn-s" style="font-size:13px;padding:8px 16px;border:1px solid var(--mint-dim);">GC</div>
          </div>
          <div class="btn-p ${(tab==='Cash'&&cashAmt<due)?'btn-off':''}" style="width:100%;padding:12px;font-size:15px;font-weight:bold;" onclick="charge()">
            ✔ Charge ${tab} — $${due.toFixed(2)}
          </div>
        </div>
      </div>
    </div>`;

    // Items grouped by seat
    const rail=$('pay-items');
    const seats=[...new Set(items.map(i=>i.seat))].sort();
    seats.forEach(sn=>{
      const si=items.filter(i=>i.seat===sn);
      if(seats.length>1){const d=document.createElement('div');d.style.cssText='font-size:11px;opacity:0.4;margin:6px 0 2px;';d.textContent=`── Seat ${sn} ──`;rail.appendChild(d);}
      si.forEach(i=>{const d=document.createElement('div');d.style.cssText='display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px;';d.innerHTML=`<span>${i.qty||1}x ${i.name}</span><span>$${(i.price*(i.qty||1)).toFixed(2)}</span>`;rail.appendChild(d);});
    });
  }

  window.setTab=(tb)=>{tab=tb;cashAmt=0;draw();};
  window.addCash=(n)=>{cashAmt+=n;draw();};// ADDITIVE per spec
  window.setCashExact=()=>{cashAmt=t.cash;draw();};
  window.clearCash=()=>{cashAmt=0;draw();};
  window.charge=()=>{const due=tab==='Cash'?t.cash:t.card;if(tab==='Cash'&&cashAmt<due)return;APP.orders=APP.orders.filter(o=>o.id!==order.id);go('snapshot');};

  draw();
}

// ═══════════════════════════════════════════════════
//  CLOSE DAY
// ═══════════════════════════════════════════════════
function scCloseDay(el){
  const all=ROSTER.map(r=>({name:r.name,open:APP.orders.filter(o=>o.server===r.name).length,done:APP.orders.filter(o=>o.server===r.name).length===0}));
  const pct=all.length>0?(all.filter(s=>s.done).length/all.length*100):0;
  el.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;height:100%;padding:16px;gap:16px;">
    <div style="font-family:var(--fh);font-size:22px;color:var(--yellow);">CLOSE DAY</div>
    <div style="display:flex;gap:20px;flex-wrap:wrap;justify-content:center;">
      ${all.map(s=>`<div style="width:140px;height:110px;border:2px solid ${s.done?'var(--mint-dim)':'var(--mint)'};border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;${s.done?'opacity:0.35;':''}"><div style="font-weight:bold;font-size:14px;">${s.name}</div><div style="font-size:11px;opacity:0.6;">${s.done?'COMPLETE':'Open: '+s.open}</div></div>`).join('')}
    </div>
    <div style="width:500px;height:36px;border:2px solid var(--mint);border-radius:4px;overflow:hidden;position:relative;">

      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:${pct>50?'var(--bg)':'var(--mint)'};">${all.filter(s=>s.done).length}/${all.length} Complete</div>
    </div>
    <div style="display:flex;gap:20px;">
      <div class="btn-s ${pct<100?'btn-off':''}" style="width:200px;height:60px;font-family:var(--fh);font-size:15px;border:1px solid var(--mint-dim);">SUBMIT BATCH</div>
      <div class="btn-s ${pct<100?'btn-off':''}" style="width:200px;height:60px;font-family:var(--fh);font-size:15px;border:1px solid var(--mint-dim);">CLOSE DAY</div>
    </div>
    <div class="btn-s" style="margin-top:auto;font-size:13px;border:1px solid var(--mint-dim);padding:8px 20px;" onclick="go('snapshot')">← Back to Snapshot</div>
  </div>`;
}

      </div>
      <div style="border:2px solid ${c};border-radius:8px;padding:10px;">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;"><span style="opacity:0.3;">Type</span><span style="text-transform:capitalize;">${d.type}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;"><span style="opacity:0.3;">Model</span><span>${d.model}</span></div>
        <div style="margin-bottom:6px;">
          <div style="font-size:11px;opacity:0.4;margin-bottom:2px;">MAC Address (anchor)</div>
          <div style="font-family:monospace;font-size:15px;font-weight:bold;color:${c};text-shadow:0 0 4px ${c}40;">${d.mac}</div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;"><span style="opacity:0.3;">IP</span><span style="font-family:monospace;">${d.ip}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;"><span style="opacity:0.3;">Connection</span><span style="color:${connColor};">${connLabel}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;"><span style="opacity:0.3;">Status</span><span style="color:#44FF88;text-shadow:0 0 4px rgba(68,255,136,0.4);">● ${d.status}</span></div>
      </div>
      <div><div style="font-size:11px;opacity:0.4;margin-bottom:3px;">Location Label</div><input type="text" value="${d.label}" style="font-size:14px;" onchange="window._hwLabel('${d.id}',this.value)"></div>
      <div class="btn-s" style="width:100%;font-size:13px;padding:8px;border:1px solid var(--mint-dim);" onclick="window._hwTest('${d.id}')">Test Connectivity</div>
      ${d.id!=='trm'?`<div class="btn-d" style="width:100%;font-size:12px;padding:6px;" onclick="window._hwRemove('${d.id}')">Remove Device</div>`:''}
    </div>`;
  }

  function drawLines(){
    const svg=$('hw-lines');if(!svg)return;
    const hub=devices.find(d=>d.id==='trm');if(!hub)return;
    let lines='';
    // Dashed animation styles
    lines+=`<defs><style>
      .hw-line-net{stroke:#6688FF;stroke-width:2;fill:none;stroke-dasharray:8 4;animation:hwDash 2s linear infinite;}
      .hw-line-usb{stroke:#FF44AA;stroke-width:2.5;fill:none;stroke-dasharray:6 3;animation:hwDash 1.5s linear infinite;}
      @keyframes hwDash{to{stroke-dashoffset:-24;}}
    </style></defs>`;
    devices.forEach(d=>{
      if(d.id==='trm')return;
      const cls=d.conn==='usb'?'hw-line-usb':'hw-line-net';
      // Curved path from hub to device
      const mx=(hub.x+d.x)/2;const my=(hub.y+d.y)/2 - 20;
      lines+=`<path d="M${hub.x},${hub.y} Q${mx},${my} ${d.x},${d.y}" class="${cls}" opacity="${selDev&&selDev!==d.id&&selDev!=='trm'?'0.15':'0.6'}"/>`;
    });
    svg.innerHTML=lines;
  }

  function drawNodes(){
    const container=$('hw-nodes');if(!container)return;
    devices.forEach(d=>{
      const c=HW_COLORS[d.type]||HW_COLORS.unknown;
      const sel=selDev===d.id;
      const isHub=d.id==='trm';
      const size=isHub?70:56;
      const n=document.createElement('div');
      n.style.cssText=`position:absolute;left:${d.x-size/2}px;top:${d.y-size/2}px;width:${size}px;height:${size}px;border:2px solid ${c};border-radius:${isHub?'50%':'10px'};background:${sel?c:'var(--bg2)'};color:${sel?'var(--bg)':c};display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 ${sel?'12':'6'}px ${c}40;transition:box-shadow 0.2s;user-select:none;`;
      const icon=d.type==='terminal'?'◆':d.type==='printer'?'⎙':d.type==='payment'?'💳':d.type==='network'?'◎':'?';
      n.innerHTML=`<span style="font-size:${isHub?'18':'15'}px;">${icon}</span><span style="font-size:${isHub?'9':'8'}px;font-weight:bold;white-space:nowrap;margin-top:1px;">${d.name}</span>`;
      // Status dot
      const dot=document.createElement('span');
      dot.style.cssText=`position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;background:${d.status==='online'?'#44FF88':'#FF5555'};box-shadow:0 0 4px ${d.status==='online'?'rgba(68,255,136,0.5)':'rgba(255,85,85,0.5)'};`;
      n.appendChild(dot);
      n.onclick=()=>{selDev=selDev===d.id?null:d.id;draw();};
      container.appendChild(n);
    });
  }

  // Handlers
  window._hwSel=(id)=>{selDev=id;draw();};
  window._hwLabel=(id,val)=>{const d=devices.find(x=>x.id===id);if(d)d.label=val;};
  window._hwTest=(id)=>{
    const d=devices.find(x=>x.id===id);
    if(!d)return;
    d.status='testing';draw();
    setTimeout(()=>{d.status='online';draw();showToast(d.name+' — connected ✓');},1200);
  };
  window._hwRemove=(id)=>{devices=devices.filter(d=>d.id!==id);selDev=null;draw();};

  // Scan simulation
  window._hwScan=()=>{
    if(scanning)return;
    scanning=true;scanPct=0;scanFound=devices.length;draw();
    const steps=[20,40,55,70,85,100];
    let i=0;
    const tick=()=>{
      if(i>=steps.length){scanning=false;draw();showToast('Scan complete — '+devices.length+' devices');return;}
      scanPct=steps[i];
      if(i===2&&!devices.find(d=>d.id==='prn3')){
        devices.push({id:'prn3',type:'printer',name:'Bar Printer',model:'TM-U220',mac:'AA:BB:CC:DD:EE:03',ip:'192.168.1.52',conn:'network',status:'online',x:350,y:80,label:'Bar'});
        scanFound++;
      }
      i++;draw();
      setTimeout(tick,600);
    };
    setTimeout(tick,400);
  };

  // Add device overlay
  window._hwAdd=()=>{
    const ov=document.createElement('div');ov.className='overlay';
    ov.innerHTML=`<div class="dialog" style="min-width:380px;">
      <div class="dlg-h"><span>ADD DEVICE</span><span style="cursor:pointer;" onclick="this.closest('.overlay').remove()">✕</span></div>
      <div class="dlg-b">
        <div><div style="font-size:11px;opacity:0.3;margin-bottom:3px;">Device Name</div><input type="text" id="hwa-name" placeholder="e.g. Cold Line Printer"></div>
        <div style="display:flex;gap:8px;">
          <div style="flex:1;"><div style="font-size:11px;opacity:0.3;margin-bottom:3px;">Type</div>
            <select id="hwa-type" style="width:100%;background:var(--bg2);border:1px solid var(--mint);color:var(--mint);padding:6px;font-family:var(--fb);font-size:14px;border-radius:4px;">
              <option value="printer">Printer</option><option value="payment">Payment</option><option value="network">Network</option><option value="unknown">Other</option>
            </select>
          </div>
          <div style="flex:1;"><div style="font-size:11px;opacity:0.3;margin-bottom:3px;">Connection</div>
            <select id="hwa-conn" style="width:100%;background:var(--bg2);border:1px solid var(--mint);color:var(--mint);padding:6px;font-family:var(--fb);font-size:14px;border-radius:4px;">
              <option value="network">Network</option><option value="usb">USB</option>
            </select>
          </div>
        </div>
        <div><div style="font-size:11px;opacity:0.3;margin-bottom:3px;">MAC Address</div><input type="text" id="hwa-mac" placeholder="AA:BB:CC:DD:EE:FF"></div>
        <div><div style="font-size:11px;opacity:0.3;margin-bottom:3px;">IP Address</div><input type="text" id="hwa-ip" placeholder="192.168.1.xx (or — for USB)"></div>
        <div><div style="font-size:11px;opacity:0.3;margin-bottom:3px;">Location Label</div><input type="text" id="hwa-label" placeholder="e.g. Kitchen, Bar, Front"></div>
      </div>
      <div class="dlg-f">
        <div class="btn-s" style="border:1px solid var(--mint-dim);font-size:14px;padding:8px 16px;" onclick="this.closest('.overlay').remove()">Cancel</div>
        <div class="btn-p" style="font-size:14px;padding:8px 16px;" id="hwa-ok">Add Device</div>
      </div>
    </div>`;
    el.appendChild(ov);
    setTimeout(()=>{const i=ov.querySelector('#hwa-name');if(i)i.focus();},50);
    ov.querySelector('#hwa-ok').onclick=()=>{
      const name=ov.querySelector('#hwa-name').value.trim();
      const mac=ov.querySelector('#hwa-mac').value.trim();
      if(!name||!mac)return;
      const type=ov.querySelector('#hwa-type').value;
      const conn=ov.querySelector('#hwa-conn').value;
      const ip=ov.querySelector('#hwa-ip').value.trim()||'—';
      const label=ov.querySelector('#hwa-label').value.trim()||'';
      // Place near center with slight random offset
      const x=400+Math.floor(Math.random()*100-50);
      const y=200+Math.floor(Math.random()*100-50);
      devices.push({id:'hw'+Date.now(),type,name,model:'Manual',mac,ip,conn,status:'online',x,y,label});
      ov.remove();
      showToast('Added: '+name);
      draw();
    };
  };

  function showToast(text){
    const t=document.createElement('div');
    t.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--mint);color:var(--bg);padding:14px 28px;border-radius:8px;font-size:16px;font-weight:bold;z-index:200;pointer-events:none;opacity:1;transition:opacity 0.5s;';
    t.textContent=text;el.style.position='relative';el.appendChild(t);
    setTimeout(()=>{t.style.opacity='0';},1200);setTimeout(()=>{t.remove();},1800);
  }

  draw();
}
